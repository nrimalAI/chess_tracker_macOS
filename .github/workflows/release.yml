name: Release

# Tag a version to publish a downloadable build:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The job notarizes automatically when Developer ID credentials are present as
# repository secrets, and falls back to an unsigned build when they aren't, so
# releases work before and after Apple Developer Program enrollment.
#
# Secrets required for a notarized release:
#   CERTIFICATE_P12        base64 of your exported Developer ID .p12
#                          (base64 -i cert.p12 | pbcopy)
#   CERTIFICATE_PASSWORD   password you set when exporting the .p12
#   APPLE_TEAM_ID          10-character team id
#   APPLE_ID               Apple account email
#   APPLE_APP_PASSWORD     app-specific password from appleid.apple.com

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run logic tests
        run: ./Scripts/run_selftest.sh

      - name: Import Developer ID certificate
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12}" ]; then
            echo "No CERTIFICATE_P12 secret — building unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Without this, codesign blocks on a GUI keychain prompt that no one
          # can answer on a headless runner.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db

          rm -f "$RUNNER_TEMP/certificate.p12"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build signed app
        if: steps.signing.outputs.signed == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project ChessTime.xcodeproj \
            -scheme ChessTime \
            -configuration Release \
            -archivePath build/ChessTime.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime"

          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>$TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/ChessTime.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Build unsigned app
        if: steps.signing.outputs.signed != 'true'
        run: |
          xcodebuild build \
            -project ChessTime.xcodeproj \
            -scheme ChessTime \
            -configuration Release \
            -derivedDataPath build/dd \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            ENABLE_HARDENED_RUNTIME=NO
          mkdir -p build/export
          cp -R build/dd/Build/Products/Release/ChessTime.app build/export/

      - name: Package disk image
        run: ./Scripts/package_dmg.sh build/export/ChessTime.app build/ChessTime.dmg

      - name: Notarize and staple
        if: steps.signing.outputs.signed == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit build/ChessTime.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple build/ChessTime.dmg
          xcrun stapler validate build/ChessTime.dmg
          spctl -a -vvv -t install build/export/ChessTime.app

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          SIGNED: ${{ steps.signing.outputs.signed }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "$SIGNED" = "true" ]; then
            NOTES=$'Download `ChessTime.dmg`, open it, and drag ChessTime to Applications.\n\nRequires macOS 14 or later.'
          else
            NOTES=$'Download `ChessTime.dmg`, open it, and drag ChessTime to Applications.\n\n**This build is not notarized**, so macOS will refuse to open it the first time. To allow it: open **System Settings → Privacy & Security**, scroll to the message about ChessTime being blocked, and click **Open Anyway**. You only need to do this once.\n\nRequires macOS 14 or later.'
          fi
          gh release create "$TAG" build/ChessTime.dmg \
            --title "ChessTime $TAG" \
            --notes "$NOTES"
